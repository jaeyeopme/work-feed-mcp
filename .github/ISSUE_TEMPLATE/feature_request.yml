name: Feature request
description: Propose a scoped improvement to the Docker/MCP data engine.
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Keep requests within the data-engine scope: Docker runtime, MCP tools, SQLite persistence, collection normalization, docs, tests, or release automation.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What user or maintainer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful behavior change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Main area
      options:
        - MCP tools
        - Docker runtime
        - SQLite schema/query
        - Upwork normalization
        - Agent documentation/skill
        - CI/release automation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Scope boundaries
      options:
        - label: This does not add proposal/message generation or auto-apply behavior.
          required: true
        - label: This does not add a backend ranking or recommendation engine.
          required: true
        - label: This does not add cookie/session/proxy/bypass guidance.
          required: true
        - label: This can be verified without live collection, or live evidence is clearly optional and separate.
          required: true
