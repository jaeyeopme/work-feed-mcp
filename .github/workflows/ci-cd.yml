name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash


jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run quality checks
        run: make quality
      - name: Run coverage gate
        run: make coverage
      - name: Run smoke
        run: make smoke
      - name: Run e2e smoke
        run: make e2e-smoke
