name: ci-cd

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash


jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run quality checks
        run: make quality
      - name: Run smoke
        run: make smoke
      - name: Run e2e smoke
        run: make e2e-smoke

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deploy_relevant: ${{ steps.changed-files.outputs.deploy_relevant }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Decide whether Oracle deploy is needed
        id: changed-files
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: scripts/deploy/should-deploy-oracle.sh

  deploy-oracle:
    runs-on: ubuntu-latest
    concurrency:
      group: oracle-deploy-main
      cancel-in-progress: false
    timeout-minutes: 15
    needs: [quality, changes]
    environment: oracle-cloud
    if: needs.changes.outputs.deploy_relevant == 'true'
    steps:
      - name: Validate deploy secrets
        env:
          ORACLE_SSH_HOST: ${{ secrets.ORACLE_SSH_HOST }}
          ORACLE_SSH_USER: ${{ secrets.ORACLE_SSH_USER }}
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_DEPLOY_PATH: ${{ secrets.ORACLE_DEPLOY_PATH }}
        run: |
          test -n "$ORACLE_SSH_HOST" || { echo "missing ORACLE_SSH_HOST" >&2; exit 1; }
          test -n "$ORACLE_SSH_USER" || { echo "missing ORACLE_SSH_USER" >&2; exit 1; }
          test -n "$ORACLE_SSH_KEY" || { echo "missing ORACLE_SSH_KEY" >&2; exit 1; }
          test -n "$ORACLE_DEPLOY_PATH" || { echo "missing ORACLE_DEPLOY_PATH" >&2; exit 1; }

      - name: Configure SSH
        env:
          ORACLE_SSH_HOST: ${{ secrets.ORACLE_SSH_HOST }}
          ORACLE_SSH_PORT: ${{ secrets.ORACLE_SSH_PORT }}
          ORACLE_SSH_USER: ${{ secrets.ORACLE_SSH_USER }}
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          ORACLE_SSH_PORT="${ORACLE_SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$ORACLE_SSH_KEY" > ~/.ssh/oracle_deploy_key
          chmod 600 ~/.ssh/oracle_deploy_key
          ssh-keyscan -p "$ORACLE_SSH_PORT" -H "$ORACLE_SSH_HOST" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF_SSH
          Host oracle-work-feed
            HostName $ORACLE_SSH_HOST
            User $ORACLE_SSH_USER
            Port $ORACLE_SSH_PORT
            IdentityFile ~/.ssh/oracle_deploy_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
          EOF_SSH

      - name: Deploy compose runtime
        env:
          ORACLE_DEPLOY_PATH: ${{ secrets.ORACLE_DEPLOY_PATH }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh oracle-work-feed \
            "ORACLE_DEPLOY_PATH='$ORACLE_DEPLOY_PATH' DEPLOY_SHA='$DEPLOY_SHA' bash -se" <<'REMOTE'
          set -euo pipefail
          cd "$ORACLE_DEPLOY_PATH"
          PREVIOUS_SHA="$(git rev-parse HEAD)"
          git fetch --prune origin main
          git checkout main
          git reset --hard "$DEPLOY_SHA"
          PREVIOUS_SHA="$PREVIOUS_SHA" DEPLOY_SHA="$DEPLOY_SHA" ORACLE_DEPLOY_PATH="$ORACLE_DEPLOY_PATH" bash scripts/deploy/oracle-compose-deploy.sh
          REMOTE
