name: deploy-oracle

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-main
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run quality checks
        run: make quality
      - name: Run smoke
        run: make smoke
      - name: Run e2e smoke
        run: make e2e-smoke

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: oracle-cloud
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Validate deploy secrets
        env:
          ORACLE_SSH_HOST: ${{ secrets.ORACLE_SSH_HOST }}
          ORACLE_SSH_USER: ${{ secrets.ORACLE_SSH_USER }}
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_DEPLOY_PATH: ${{ secrets.ORACLE_DEPLOY_PATH }}
        run: |
          test -n "$ORACLE_SSH_HOST" || { echo "missing ORACLE_SSH_HOST" >&2; exit 1; }
          test -n "$ORACLE_SSH_USER" || { echo "missing ORACLE_SSH_USER" >&2; exit 1; }
          test -n "$ORACLE_SSH_KEY" || { echo "missing ORACLE_SSH_KEY" >&2; exit 1; }
          test -n "$ORACLE_DEPLOY_PATH" || { echo "missing ORACLE_DEPLOY_PATH" >&2; exit 1; }

      - name: Configure SSH
        env:
          ORACLE_SSH_HOST: ${{ secrets.ORACLE_SSH_HOST }}
          ORACLE_SSH_PORT: ${{ secrets.ORACLE_SSH_PORT || '22' }}
          ORACLE_SSH_USER: ${{ secrets.ORACLE_SSH_USER }}
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$ORACLE_SSH_KEY" > ~/.ssh/oracle_deploy_key
          chmod 600 ~/.ssh/oracle_deploy_key
          ssh-keyscan -p "$ORACLE_SSH_PORT" -H "$ORACLE_SSH_HOST" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host oracle-work-feed
            HostName $ORACLE_SSH_HOST
            User $ORACLE_SSH_USER
            Port $ORACLE_SSH_PORT
            IdentityFile ~/.ssh/oracle_deploy_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
          EOF

      - name: Deploy compose runtime
        env:
          ORACLE_DEPLOY_PATH: ${{ secrets.ORACLE_DEPLOY_PATH }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh oracle-work-feed \
            "ORACLE_DEPLOY_PATH='$ORACLE_DEPLOY_PATH' DEPLOY_SHA='$DEPLOY_SHA' bash -se" <<'REMOTE'
          set -euo pipefail
          cd "$ORACLE_DEPLOY_PATH"
          git fetch --prune origin main
          git checkout main
          git reset --hard "$DEPLOY_SHA"
          docker compose config >/tmp/work-feed-compose-config.yaml
          docker compose up -d --build --remove-orphans
          docker compose ps
          docker compose exec -T work-feed-worker work-feed health --role worker --db /data/work-feed.sqlite
          docker compose exec -T work-feed-mcp sh -lc 'work-feed health --role mcp --db /data/work-feed.sqlite --http-url "http://127.0.0.1:${WORK_FEED_MCP_PORT:-8000}${WORK_FEED_MCP_PATH:-/mcp}"'
          docker compose exec -T work-feed-mcp sh -lc 'work-feed mcp-smoke --url "http://127.0.0.1:${WORK_FEED_MCP_PORT:-8000}${WORK_FEED_MCP_PATH:-/mcp}"'
          docker compose exec -T work-feed-worker work-feed scheduler-status --db /data/work-feed.sqlite
          REMOTE
