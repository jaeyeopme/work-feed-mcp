name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          tag="${REF_NAME}"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "release tags must look like vMAJOR.MINOR.PATCH; got ${tag}" >&2
            exit 1
          fi
          image="ghcr.io/${REPOSITORY,,}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "source=${SERVER_URL}/${REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        env:
          GHCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: echo "$GHCR_PASSWORD" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Build container image
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          SOURCE: ${{ steps.meta.outputs.source }}
          REVISION: ${{ github.sha }}
        run: |
          docker build \
            --label "org.opencontainers.image.source=${SOURCE}" \
            --label "org.opencontainers.image.description=Docker/MCP-first data engine for collected Upwork job discovery" \
            --label "org.opencontainers.image.licenses=MIT" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.revision=${REVISION}" \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            .

      - name: Push container image
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          gh release create "$TAG" \
            --verify-tag \
            --title "$TAG" \
            --generate-notes \
            --notes-start-tag "" \
            --notes "Container image: \`${IMAGE}:${TAG}\`"
