services:
  work-feed-worker:
    build: .
    image: work-feed-mcp:local
    command: ["work-feed", "worker"]
    restart: unless-stopped
    environment:
      WORK_FEED_LIVE: "${WORK_FEED_LIVE:-1}"
      WORK_FEED_DB: "${WORK_FEED_DB:-/data/work-feed.sqlite}"
      WORK_FEED_INTERVAL_SECONDS: "${WORK_FEED_INTERVAL_SECONDS:-3600}"
      WORK_FEED_MAX_PAGES: "${WORK_FEED_MAX_PAGES:-5}"
      WORK_FEED_PAGE_SIZE: "${WORK_FEED_PAGE_SIZE:-50}"
      WORK_FEED_QUERIES: "${WORK_FEED_QUERIES:-}"
      WORK_FEED_LOG_LEVEL: "${WORK_FEED_LOG_LEVEL:-INFO}"
    volumes:
      - work-feed-data:/data
    healthcheck:
      test: ["CMD", "work-feed", "health", "--role", "worker", "--db", "/data/work-feed.sqlite"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  work-feed-mcp:
    build: .
    image: work-feed-mcp:local
    command: ["work-feed", "mcp-server"]
    restart: unless-stopped
    environment:
      WORK_FEED_DB: "${WORK_FEED_DB:-/data/work-feed.sqlite}"
      WORK_FEED_MCP_HOST: "${WORK_FEED_MCP_HOST:-0.0.0.0}"
      WORK_FEED_MCP_PORT: "${WORK_FEED_MCP_PORT:-8000}"
      WORK_FEED_MCP_PATH: "${WORK_FEED_MCP_PATH:-/mcp}"
      WORK_FEED_MCP_TRANSPORT: "streamable-http"
    ports:
      - "127.0.0.1:${WORK_FEED_MCP_PORT:-8000}:${WORK_FEED_MCP_PORT:-8000}"
    volumes:
      - work-feed-data:/data
    depends_on:
      work-feed-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "work-feed health --role mcp --db /data/work-feed.sqlite --http-url http://127.0.0.1:$${WORK_FEED_MCP_PORT:-8000}$${WORK_FEED_MCP_PATH:-/mcp}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  work-feed-data:
