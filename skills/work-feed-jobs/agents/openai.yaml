interface:
  display_name: "Work Feed Jobs"
  short_description: "Query collected Upwork jobs via MCP"
  default_prompt: "Use $work-feed-jobs to show recent collected Upwork job candidates."
dependencies:
  tools:
    - type: "mcp"
      value: "work-feed"
      description: "work-feed MCP tools: jobs_recent, jobs_search, jobs_get, runs_recent, collector_status"
policy:
  allow_implicit_invocation: true
